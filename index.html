// ── Router ───────────────────────────────────────────────────
function useHashRoute() {
  const parse = () => {
    const raw = window.location.hash.slice(1) || "/";
    return raw.startsWith("/") ? raw : "/" + raw;
  };
  const [route, setRoute] = React.useState(parse());
  React.useEffect(() => {
    const onHash = () => setRoute(parse());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return route;
}

window.nav = (path) => {
  if (!path.startsWith("/")) path = "/" + path;
  if (window.location.hash.slice(1) === path) return;
  window.location.hash = path;
  window.scrollTo(0, 0);
};

// ── Paywall ──────────────────────────────────────────────────
function useCountdown(totalSeconds) {
  const [remaining, setRemaining] = React.useState(totalSeconds);
  React.useEffect(() => {
    if (remaining <= 0) return;
    const id = setInterval(() => setRemaining(r => Math.max(0, r - 1)), 1000);
    return () => clearInterval(id);
  }, [remaining]);
  const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
  const ss = String(remaining % 60).padStart(2, "0");
  return { remaining, label: `${mm}:${ss}` };
}

      </div>
      <h1 className="w-serif" style={{ fontSize: 44, margin: 0, fontWeight: 400, textAlign:"center" }}>
        You're in. Welcome to Wittio.
      </h1>
      <p style={{ color: W.muted, fontSize: 16, textAlign:"center", maxWidth: 480, margin: 0 }}>

// ── 404 ──────────────────────────────────────────────────────
function NotFound({ path }) {
  return (
    <div style={{
      minHeight: "100vh", display:"flex", alignItems:"center", justifyContent:"center",
      flexDirection:"column", gap: 20, color: W.muted,
    }}>
      <div className="w-mono" style={{ fontSize: 80, color: "var(--accent)" }}>404</div>
      <div className="w-mono" style={{ fontSize: 14 }}>no route at <span style={{color: W.text}}>{path}</span></div>
      <button className="w-btn w-btn-primary" onClick={() => window.nav("/")}>← home</button>
    </div>
  );
}

// ── App / Router ─────────────────────────────────────────────
function App() {
  const route = useHashRoute();
  const [qIdx, setQIdx] = React.useState(0);
  const [answers, setAnswers] = React.useState({}); // { q1: "b", q2: "c", ... }

  const question = QUESTIONS[qIdx];
  const total = QUESTIONS.length;

  // Derived score
  const correct = QUESTIONS.reduce((n, q) => n + (answers[q.id] === q.correctId ? 1 : 0), 0);
  const score = 85 + correct * 15; // 85, 100, 115, 130
  const breakdown = QUESTIONS.map(q => ({
    section: q.section,
    correct: answers[q.id] === q.correctId,
  }));

  // Handlers
  const startIq = () => {
    setQIdx(0);
    setAnswers({});
    window.nav("/iq/q");
  };
  const selectAnswer = (qId, optId) => {
    setAnswers(a => ({ ...a, [qId]: optId }));
  };
  const nextQuestion = () => {
    if (qIdx >= total - 1) {
      window.nav("/iq/results");
    } else {
      setQIdx(qIdx + 1);
    }
  };
  const prevQuestion = () => { if (qIdx > 0) setQIdx(qIdx - 1); };

  let screen;
  if (route === "/" || route === "") {
    screen = <Landing/>;
  } else if (route === "/onboarding") {
    screen = <Onboarding step={2} onContinue={() => window.nav("/iq")} onSkip={() => window.nav("/iq")}/>;
  } else if (route === "/iq") {
    screen = <IQIntro onStart={startIq}/>;
  } else if (route === "/iq/q") {
    screen = <IQQuestion
      question={question}
      qNum={qIdx + 1}
      total={total}
      selected={answers[question.id] || null}
      onSelect={(optId) => selectAnswer(question.id, optId)}
      onNext={nextQuestion}
      onPrev={prevQuestion}
      onSkip={nextQuestion}
    />;
  } else if (route === "/iq/results") {
    screen = <IQResults
      score={score}
      correct={correct}
      total={total}
      breakdown={breakdown}
      onContinue={() => window.nav("/paywall")}
      onRetake={startIq}
    />;
  } else if (route === "/paywall") {
    screen = <Paywall
      score={score}
      correct={correct}
      total={total}
      onDone={() => window.nav("/paywall/success")}
      onBack={() => window.nav("/iq/results")}
    />;
  } else if (route === "/paywall/success") {
    screen = <PaywallSuccess onContinue={() => window.nav("/today")}/>;
  } else if (route === "/today") {
    screen = <AppShell active="today"><Today/></AppShell>;
  } else if (route === "/training") {
    screen = <AppShell active="train"><Training/></AppShell>;
  } else if (route === "/library") {
    screen = <AppShell active="library"><Library/></AppShell>;
  } else if (route === "/library/neuroplasticity") {
    screen = <AppShell active="library"><ArticleNeuroplasticity/></AppShell>;
  } else if (route === "/profile") {
    screen = <AppShell active="profile"><Profile/></AppShell>;
  } else if (route === "/games" || route === "/games/") {
    window.nav("/games/memory"); screen = null;
  } else if (route === "/games/memory") {
    screen = <GameMemoryGrid/>;
  } else if (route === "/games/reaction") {
    screen = <GameReactionTime/>;
  } else if (route === "/games/words") {
    screen = <GameWordChains/>;
  } else {
    screen = <NotFound path={route}/>;
  }

  return <Shell>{screen}</Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
